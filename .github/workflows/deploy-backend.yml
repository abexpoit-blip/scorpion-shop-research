name: Deploy Backend to VPS

# Runs only when backend or workflow files change.
# Frontend is intentionally NOT deployed yet (Delivery 2).

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy backend to 161.97.100.218
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /var/www/cruzercc
            echo "▶ Pulling latest code..."
            git pull origin main
            cd backend
            echo "▶ Installing dependencies..."
            npm ci --omit=dev
            npm install --no-save typescript tsx @types/node
            echo "▶ Building..."
            npm run build
            echo "▶ Running migrations..."
            npm run migrate
            echo "▶ Restarting API..."
            pm2 restart cruzercc-api || pm2 start ecosystem.config.cjs
            pm2 save
            echo "✅ Backend deployed."
